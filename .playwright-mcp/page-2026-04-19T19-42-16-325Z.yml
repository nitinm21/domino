      - heading "What leaves your machine, and what doesn't" [level=2] [ref=e103]
      - list [ref=e104]:
        - listitem [ref=e105]:
          - strong [ref=e106]: Audio stays on device.
          - text: The Opus file lives under
          - code [ref=e107]: ~/.domino/recordings/
          - text: and is never uploaded by this plugin.
        - listitem [ref=e108]:
          - strong [ref=e109]: Transcription is local.
          - text: Whisper runs on your machine via the bundled model. No audio leaves the device during transcription.
        - listitem [ref=e110]:
          - strong [ref=e111]: Synthesis uses your Claude Code session.
          - text: During
          - code [ref=e112]: /mstop
          - text: ", the transcript text and any repo files Claude reads to ground the plan are sent to Anthropic via your existing Claude Code subscription. Treat the transcript the same way you treat anything you paste into Claude Code."
        - listitem [ref=e113]:
          - strong [ref=e114]: Execution is local.
          - text: Branch creation, edits, tests, and commits all happen in your working copy. The plugin never runs
          - code [ref=e115]: git push
          - text: and never opens a PR.
