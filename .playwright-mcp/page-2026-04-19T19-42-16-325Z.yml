    - generic [ref=e32]:
      - paragraph [ref=e33]: Overview
      - heading "What Domino does" [level=2] [ref=e34]
      - paragraph [ref=e35]: "After most working conversations, someone has to sit down and translate what was said into edits across many places: tickets in one project, spec changes in another, code in a third, follow-ups for a fourth. That translation is tedious, lossy, and often skipped."
      - paragraph [ref=e36]: Domino does the fan-out automatically. It records the meeting, transcribes it locally, identifies the projects the conversation touched, and hands each project a grounded implementation plan — pain points mapped to real files, decisions, action items, open questions.
      - paragraph [ref=e38]:
        - strong [ref=e39]: Routing and synthesis are the heart of the product.
        - text: Execution is a convenience, not the point. Domino is not trying to replace the human — it's trying to be the sounding board that has already done the boring fan-out work, so you show up to a structured, grounded starting place per project and decide what to do next.
    - generic [ref=e40]:
      - paragraph [ref=e41]: How it works
      - heading "From meeting to plan in five steps" [level=2] [ref=e42]
      - list [ref=e43]:
        - listitem [ref=e44]:
          - heading "Record" [level=3] [ref=e45]
          - paragraph [ref=e46]:
            - text: Run
            - code [ref=e47]: /mstart
            - text: inside Claude Code. Domino captures mic and system audio into a single stereo Opus file on disk. Run
            - code [ref=e48]: /mstop
            - text: when the meeting ends.
        - listitem [ref=e49]:
          - heading "Transcribe locally" [level=3] [ref=e50]
          - paragraph [ref=e51]:
            - text: Whisper runs on-device. No audio leaves your machine. Left channel becomes
            - code [ref=e52]: "\"You\""
            - text: ", right channel becomes"
            - code [ref=e53]: "\"Meeting\""
            - text: — you get clean speaker separation out of the box.
        - listitem [ref=e54]:
          - heading "Route" [level=3] [ref=e55]
          - paragraph [ref=e56]: Domino scans the directory you launched Claude Code from, identifies the projects underneath, and maps each segment of the transcript to the project it actually concerns.
        - listitem [ref=e57]:
          - heading "Synthesize" [level=3] [ref=e58]
          - paragraph [ref=e59]: "For each project, Domino writes a grounded plan: decisions, action items with owners, proposed file-level changes with quoted rationale, risks, and open questions. Empty meetings produce no plan — absence is a signal."
        - listitem [ref=e60]:
          - heading "Execute (optional)" [level=3] [ref=e61]
          - paragraph [ref=e62]: Spawn a scoped subprocess per project, create a branch, commit changes one at a time. Never pushes to remote, never opens a PR. You decide whether to run it — and you decide what to keep.
