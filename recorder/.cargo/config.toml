# The screencapturekit crate links Swift's libswift_Concurrency.dylib via
# @rpath. Its build.rs adds rpaths derived from `xcode-select -p`, but on
# machines with only the Command Line Tools (no full Xcode) the resulting
# path doesn't exist. Add the CLT-specific Swift runtime path so dyld can
# find the dylib at runtime. Harmless on systems without CLT — dyld
# silently skips nonexistent rpaths.
[target.aarch64-apple-darwin]
rustflags = [
    "-C", "link-arg=-Wl,-rpath,/Library/Developer/CommandLineTools/usr/lib/swift-5.5/macosx",
]

[target.x86_64-apple-darwin]
rustflags = [
    "-C", "link-arg=-Wl,-rpath,/Library/Developer/CommandLineTools/usr/lib/swift-5.5/macosx",
]
