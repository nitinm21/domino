name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos-arm64:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: brew install opus pkg-config

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Build release binary
        run: cargo build --release --manifest-path recorder/Cargo.toml --target aarch64-apple-darwin

      - name: Package artifact
        run: |
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p dist
          cp recorder/target/aarch64-apple-darwin/release/domino-recorder dist/
          cd dist
          tar -czf "domino-recorder-${VERSION}-darwin-arm64.tar.gz" domino-recorder
          shasum -a 256 "domino-recorder-${VERSION}-darwin-arm64.tar.gz" > "domino-recorder-${VERSION}-darwin-arm64.tar.gz.sha256"
          ls -la

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/domino-recorder-*-darwin-arm64.tar.gz
            dist/domino-recorder-*-darwin-arm64.tar.gz.sha256
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') }}
          generate_release_notes: true
