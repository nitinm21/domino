        - generic [ref=e65]:
          - heading "What Domino does" [level=2] [ref=e67]
          - paragraph [ref=e69]: "After most working conversations, someone has to sit down and translate what was said into edits across many places: tickets in one project, spec changes in another, code in a third, follow-ups for a fourth. That translation is tedious, lossy, and often skipped."
          - paragraph [ref=e70]: Domino does the fan-out automatically. It records the meeting, transcribes it locally, routes each segment to the project it touched, and writes a grounded implementation plan you can execute. Go from meeting to merge effortlessly.
        - generic [ref=e72]:
          - heading "How it works" [level=2] [ref=e75]
          - paragraph [ref=e77]: You record. Domino does the rest.
          - code [ref=e84]: "$ /mstart recording meeting… $ /mstop ├─ whisper: transcribing on-device ├─ scanning repo: grounding plan ├─ plan ready └─ execute plan or chat about it"
          - heading "Under the hood:" [level=3] [ref=e85]
          - list [ref=e86]:
            - listitem [ref=e87]:
              - strong [ref=e88]: On-device.
              - text: Transcription happens locally with Whisper; audio never leaves your machine.
            - listitem [ref=e89]:
              - strong [ref=e90]: Grounded.
              - text: "The plan cites your actual code: file-level changes, rationale, risks, open questions."
            - listitem [ref=e91]:
              - strong [ref=e92]: Local only.
              - text: If you choose to execute, Domino creates a branch and commits locally. Never pushes. Never opens a PR.
